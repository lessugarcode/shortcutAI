<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Right Click AI — Result</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    body {
      background: transparent;
    }

    /* ---------- Container ---------- */
    .result-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      animation: scaleIn 0.18s ease-out;
      overflow: hidden;
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card-hover);
    }

    /* ---------- Header ---------- */
    .result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-subtle);
      -webkit-app-region: drag;
      flex-shrink: 0;
      background: var(--bg-secondary);
    }

    .result-header-info {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .result-action-icon {
      font-size: 15px;
      flex-shrink: 0;
    }

    .result-action-name {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .result-provider {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-tertiary);
      padding: 2px 7px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .result-controls {
      display: flex;
      gap: 1px;
      -webkit-app-region: no-drag;
    }

    .result-controls .btn-icon {
      width: 26px;
      height: 26px;
      font-size: var(--font-size-sm);
      border-radius: var(--radius-sm);
      color: var(--text-tertiary);
      transition: all var(--transition-fast);
    }

    .result-controls .btn-icon:hover {
      color: var(--text-primary);
    }

    /* ---------- Content ---------- */
    .result-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px;
      font-size: var(--font-size-base);
      line-height: var(--line-height-relaxed);
      color: var(--text-primary);
      user-select: text;
    }

    /* Content wrapper for max-width readability */
    .result-content > * {
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }

    .result-content p {
      margin-bottom: 14px;
    }

    .result-content code {
      font-family: var(--font-mono);
      background: var(--bg-tertiary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: var(--font-size-sm);
      color: var(--accent-secondary);
      border: 1px solid var(--border-subtle);
    }

    .result-content pre {
      background: var(--bg-primary);
      padding: 14px 16px;
      border-radius: var(--radius-md);
      overflow-x: auto;
      margin: 14px 0;
      border: 1px solid var(--border-default);
      position: relative;
      max-width: 680px;
    }

    .result-content pre code {
      background: transparent;
      padding: 0;
      color: var(--text-primary);
      border: none;
      font-size: 12px;
      line-height: 1.6;
    }

    /* Language tag on code blocks */
    .result-content pre::before {
      content: attr(data-lang);
      position: absolute;
      top: 6px;
      right: 10px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-disabled);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .result-content ul,
    .result-content ol {
      padding-left: 20px;
      margin-bottom: 14px;
    }

    .result-content li {
      margin-bottom: 4px;
    }

    .result-content strong {
      color: var(--accent-secondary);
      font-weight: 600;
    }

    .result-content h1,
    .result-content h2,
    .result-content h3 {
      color: var(--text-primary);
      margin-top: 20px;
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .result-content h1 { font-size: var(--font-size-2xl); }
    .result-content h2 { font-size: var(--font-size-xl); }
    .result-content h3 { font-size: var(--font-size-lg); }

    .result-content blockquote {
      border-left: 2px solid var(--accent-primary);
      padding-left: 14px;
      margin: 14px 0;
      color: var(--text-secondary);
    }

    .result-content hr {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 20px 0;
    }

    .result-content a {
      color: var(--accent-primary);
      text-decoration: none;
    }

    .result-content a:hover {
      text-decoration: underline;
    }

    /* ---------- Typing Cursor ---------- */
    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--accent-primary);
      margin-left: 1px;
      animation: pulse 1s infinite;
      vertical-align: text-bottom;
      border-radius: 1px;
    }

    /* ---------- Loading State ---------- */
    .result-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 48px 24px;
      color: var(--text-tertiary);
      max-width: 680px;
      margin: 0 auto;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid var(--border-default);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .result-loading-text {
      font-size: var(--font-size-sm);
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* ---------- Footer ---------- */
    .result-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
      background: var(--bg-secondary);
    }

    .result-stats {
      font-size: 11px;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .result-stats .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .result-stats .stat-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-disabled);
    }

    .result-actions {
      display: flex;
      gap: 6px;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: var(--accent-primary);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-inverse);
      font-family: var(--font-family);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .copy-btn:hover {
      background: var(--accent-secondary);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    .copy-btn:active {
      transform: scale(0.97);
    }

    .copy-btn.copied {
      background: var(--success);
    }

    /* ---------- Error State ---------- */
    .result-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 40px 24px;
      text-align: center;
    }

    .result-error-icon {
      font-size: 28px;
      opacity: 0.7;
    }

    .result-error-msg {
      color: var(--error);
      font-size: var(--font-size-sm);
      font-weight: 500;
    }

    .result-error-detail {
      color: var(--text-tertiary);
      font-size: 11px;
      max-width: 320px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="result-container" id="resultContainer">
    <!-- Header -->
    <div class="result-header">
      <div class="result-header-info">
        <span class="result-action-icon" id="resultActionIcon">⚡</span>
        <span class="result-action-name" id="resultActionName">Processing...</span>
        <span class="result-provider" id="resultProvider"></span>
      </div>
      <div class="result-controls">
        <button class="btn-icon" id="pinBtn" data-tooltip="Pin">📌</button>
        <button class="btn-icon" id="closeBtn" data-tooltip="Close">✕</button>
      </div>
    </div>

    <!-- Content -->
    <div class="result-content" id="resultContent">
      <div class="result-loading">
        <div class="spinner"></div>
        <span class="result-loading-text">Waiting for AI...</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="result-footer" id="resultFooter" style="display: none;">
      <div class="result-stats" id="resultStats"></div>
      <div class="result-actions">
        <button class="copy-btn" id="copyBtn">
          📋 Copy
        </button>
        <button class="copy-btn" id="exportBtn" style="background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border-subtle);">
          💾 Export
        </button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/result.js"></script>
</body>
</html>
