<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Right Click AI — Result</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    body {
      background: transparent;
    }

    .result-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      animation: scaleIn 0.2s ease-out;
      overflow: hidden;
    }

    /* Header */
    .result-header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--border-subtle);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    .result-header-info {
      flex: 1;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .result-action-icon {
      font-size: 16px;
    }

    .result-action-name {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--text-primary);
    }

    .result-provider {
      font-size: var(--font-size-xs);
      color: var(--text-tertiary);
      padding: 2px 6px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
    }

    .result-controls {
      display: flex;
      gap: 2px;
      -webkit-app-region: no-drag;
    }

    .result-controls .btn-icon {
      width: 28px;
      height: 28px;
      font-size: var(--font-size-sm);
    }

    /* Content */
    .result-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-lg);
      font-size: var(--font-size-base);
      line-height: 1.7;
      color: var(--text-primary);
      user-select: text;
    }

    .result-content p {
      margin-bottom: var(--space-md);
    }

    .result-content code {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      background: var(--bg-tertiary);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      font-size: var(--font-size-sm);
    }

    .result-content pre {
      background: var(--bg-tertiary);
      padding: var(--space-md);
      border-radius: var(--radius-md);
      overflow-x: auto;
      margin: var(--space-md) 0;
      border: 1px solid var(--border-subtle);
    }

    .result-content pre code {
      background: transparent;
      padding: 0;
    }

    .result-content ul, .result-content ol {
      padding-left: var(--space-xl);
      margin-bottom: var(--space-md);
    }

    .result-content li {
      margin-bottom: var(--space-xs);
    }

    .result-content strong {
      color: var(--accent-secondary);
      font-weight: 600;
    }

    .result-content h1, .result-content h2, .result-content h3 {
      color: var(--text-primary);
      margin-top: var(--space-lg);
      margin-bottom: var(--space-sm);
    }

    /* Typing cursor */
    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent-primary);
      margin-left: 2px;
      animation: pulse 1s infinite;
      vertical-align: text-bottom;
    }

    /* Loading state */
    .result-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      padding: var(--space-3xl);
      color: var(--text-tertiary);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border-subtle);
      border-top: 3px solid var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .result-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm) var(--space-md);
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .result-stats {
      font-size: var(--font-size-xs);
      color: var(--text-tertiary);
    }

    .result-actions {
      display: flex;
      gap: var(--space-sm);
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 4px 12px;
      background: var(--gradient-primary);
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-family: var(--font-family);
      font-size: var(--font-size-xs);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px var(--accent-glow);
    }

    .copy-btn.copied {
      background: var(--success);
    }

    /* Error state */
    .result-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-2xl);
      text-align: center;
    }

    .result-error-icon {
      font-size: 32px;
    }

    .result-error-msg {
      color: var(--error);
      font-size: var(--font-size-sm);
    }

    .result-error-detail {
      color: var(--text-tertiary);
      font-size: var(--font-size-xs);
      max-width: 300px;
    }
  </style>
</head>
<body>
  <div class="result-container glass-card" id="resultContainer">
    <!-- Header -->
    <div class="result-header">
      <div class="result-header-info">
        <span class="result-action-icon" id="resultActionIcon">⚡</span>
        <span class="result-action-name" id="resultActionName">Memproses...</span>
        <span class="result-provider" id="resultProvider"></span>
      </div>
      <div class="result-controls">
        <button class="btn-icon" id="pinBtn" data-tooltip="Pin">📌</button>
        <button class="btn-icon" id="closeBtn" data-tooltip="Tutup">✕</button>
      </div>
    </div>

    <!-- Content -->
    <div class="result-content" id="resultContent">
      <div class="result-loading">
        <div class="spinner"></div>
        <span>Menunggu AI...</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="result-footer" id="resultFooter" style="display: none;">
      <div class="result-stats" id="resultStats"></div>
      <div class="result-actions">
        <button class="copy-btn" id="copyBtn">
          📋 Copy
        </button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/result.js"></script>
</body>
</html>
