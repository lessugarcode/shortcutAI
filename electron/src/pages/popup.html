<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Right Click AI — Actions</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    body {
      background: transparent;
      overflow: hidden;
    }

    /* ---------- Container ---------- */
    .popup-container {
      width: 300px;
      max-height: 400px;
      overflow: hidden;
      animation: scaleIn 0.18s ease-out;
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card-hover);
    }

    /* ---------- Header ---------- */
    .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .popup-header-icon {
      width: 30px;
      height: 30px;
      background: var(--gradient-primary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-inverse);
    }

    .popup-header-text {
      flex: 1;
      min-width: 0;
    }

    .popup-header-title {
      font-size: var(--font-size-md);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .popup-header-subtitle {
      font-size: 11px;
      color: var(--text-tertiary);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---------- Content Type Badge ---------- */
    .popup-content-type {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      margin: 10px 14px 0;
      background: var(--accent-muted);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: 500;
      color: var(--accent-secondary);
      width: fit-content;
      letter-spacing: 0.02em;
    }

    /* ---------- Action List ---------- */
    .popup-actions {
      padding: 6px 8px;
      max-height: 260px;
      overflow-y: auto;
    }

    .action-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      border-left: 2px solid transparent;
    }

    .action-item:hover {
      background: var(--bg-hover);
      border-left-color: var(--accent-primary);
    }

    .action-item:active {
      background: var(--bg-active);
      transform: scale(0.985);
    }

    .action-icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      background: var(--bg-tertiary);
      font-size: 17px;
      flex-shrink: 0;
      transition: all var(--transition-fast);
    }

    .action-item:hover .action-icon {
      background: var(--accent-subtle);
    }

    .action-info {
      flex: 1;
      min-width: 0;
    }

    .action-name {
      font-size: var(--font-size-md);
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .action-desc {
      font-size: 11px;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .action-shortcut {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .action-arrow {
      color: var(--text-tertiary);
      font-size: 11px;
      opacity: 0;
      transition: all var(--transition-fast);
      transform: translateX(-4px);
    }

    .action-item:hover .action-arrow {
      opacity: 1;
      transform: translateX(0);
      color: var(--accent-primary);
    }

    /* ---------- Ask AI Input ---------- */
    .ask-ai-container {
      padding: 8px 14px 12px;
      border-top: 1px solid var(--border-subtle);
    }

    .ask-ai-input-wrapper {
      display: flex;
      gap: 6px;
    }

    .ask-ai-input {
      flex: 1;
      padding: 7px 10px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      outline: none;
      transition: all var(--transition-fast);
      letter-spacing: -0.01em;
    }

    .ask-ai-input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    .ask-ai-input::placeholder {
      color: var(--text-disabled);
    }

    .ask-ai-send {
      width: 32px;
      height: 32px;
      background: var(--accent-primary);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-inverse);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }

    .ask-ai-send:hover {
      background: var(--accent-secondary);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .ask-ai-send:active {
      transform: scale(0.95);
    }

    /* ---------- Loading Indicator ---------- */
    .loading-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px 0;
      color: var(--text-tertiary);
      font-size: var(--font-size-sm);
    }

    .loading-dots {
      display: flex;
      gap: 4px;
    }

    .loading-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-primary);
      animation: pulse 1.4s infinite ease-in-out;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.16s; }
    .loading-dot:nth-child(3) { animation-delay: 0.32s; }

    /* ---------- Language Select Overlay ---------- */
    .lang-select-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--glass-bg-strong);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-radius: var(--radius-lg);
      z-index: 10;
      animation: fadeIn 0.12s ease-out;
      overflow-y: auto;
      padding: 10px;
    }

    .lang-select-overlay.active {
      display: block;
    }

    .lang-back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-md);
      margin-bottom: 6px;
      transition: all var(--transition-fast);
    }

    .lang-back-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .lang-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-size: var(--font-size-md);
      color: var(--text-secondary);
    }

    .lang-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .lang-flag {
      font-size: 18px;
      flex-shrink: 0;
    }

    .lang-name {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="popup-container" id="popup">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-header-icon">⚡</div>
      <div class="popup-header-text">
        <div class="popup-header-title">Right Click AI</div>
        <div class="popup-header-subtitle" id="previewText">Processing...</div>
      </div>
    </div>

    <!-- Content Type Badge -->
    <div class="popup-content-type" id="contentTypeBadge" style="display: none;">
      <span id="contentTypeIcon">📝</span>
      <span id="contentTypeLabel">Text</span>
    </div>

    <!-- Action List -->
    <div class="popup-actions" id="actionList">
      <div class="loading-indicator">
        <div class="loading-dots">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
      </div>
    </div>

    <!-- Ask AI Input -->
    <div class="ask-ai-container" id="askAiContainer" style="display: none;">
      <div class="ask-ai-input-wrapper">
        <input
          type="text"
          class="ask-ai-input"
          id="askAiInput"
          placeholder="Ask AI..."
          autocomplete="off"
        >
        <button class="ask-ai-send" id="askAiSend" data-tooltip="Send">
          →
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:8px;padding:0 2px;">
        <label class="toggle" style="transform:scale(0.75);transform-origin:left center;">
          <input type="checkbox" id="autoPasteCheck">
          <span class="toggle-slider"></span>
        </label>
        <span style="font-size:10px;color:var(--text-tertiary);">Auto-paste after response</span>
      </div>
    </div>

    <!-- Language Select Overlay -->
    <div class="lang-select-overlay" id="langOverlay">
      <div class="lang-back-btn" id="langBack">← Back</div>
      <div id="langList"></div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/popup.js"></script>
</body>
</html>
